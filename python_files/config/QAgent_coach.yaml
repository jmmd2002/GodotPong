# Q-Learning Agent Configuration

# State variables to track
state:
  - paddle_y
  - ball_x
  - ball_y
  - ball_vx
  - ball_vy

# State space discretization
# Maps each state variable to the number of bins to use
bins_config:
  paddle_y: 4
  ball_x: 8
  ball_y: 8
  ball_vx: 4
  ball_vy: 4

# Available actions
actions:
  - UP
  - DOWN
  - STAY

# Learning hyperparameters
hyperparameters:
  alpha: 0.10     # Learning rate: how much we update Q-values (0 to 1)
  gamma: 0.99      # Discount factor: 1.0 = no discounting; valid for finite episodic tasks
  epsilon: 0.20  # Exploration rate: probability of random action (0 to 1)

# Model persistence settings
model:
  path: models/q_coach_table.json         # Relative to python_files/
  load_on_start: true               # Load existing model if file exists
  save_on_exit: true                # Save model when server shuts down
  autosave_every_n_steps: 100       # 0 disables autosave during runtime
  num_workers: 2                    # Number of parallel Godot instances (ports BASE_PORT to BASE_PORT+N-1)

# Logging / monitoring settings
logs:
  log_every_n_steps: 100            # How often worker 0 records a stats snapshot (0 disables)
  log_path: logs/coach_training_log.csv   # Relative to python_files/; written on shutdown
  reward_window: 20            # Number of recent episodes used to compute avg reward
