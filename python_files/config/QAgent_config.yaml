# Q-Learning Agent Configuration

# State variables to track
state:
  - paddleA_y
  - paddleB_y
  - ball_x
  - ball_y
  - ball_vx
  - ball_vy

# State space discretization
# Maps each state variable to the number of bins to use
bins_config:
  paddleA_y: 6
  paddleB_y: 6
  ball_x: 8
  ball_y: 6
  ball_vx: 3
  ball_vy: 3

# Available actions
actions:
  - UP
  - DOWN
  - STAY
