# Advantage Actor-Critic (A2C) Agent — Coach
#
# The coach only sees its own paddle + the ball (no opponent paddle).
# It is trained in "coach" mode: it plays against the student and
# provides a moving target that keeps the student challenged.

# State variables (continuous, normalised to [-1, 1] by Godot)
state:
  - paddle_y
  - ball_x
  - ball_y
  - ball_vx
  - ball_vy

# Available actions
actions:
  - UP
  - DOWN
  - STAY

# Learning hyperparameters
hyperparameters:
  # Actor learning rate.
  # Smaller than REINFORCE because the advantage signal A_t has lower
  # variance than raw G_t — smaller steps are more reliable.
  alpha_actor:  0.01

  # Critic learning rate.
  # Larger than alpha_actor: the critic solves a pure regression problem
  # (MSE) which is smoother and converges faster. The critic must track
  # G_t quickly so the advantage A_t = G_t − V(s_t) stays accurate.
  alpha_critic: 0.01

  # Discount factor: 0 = myopic, 1 = full return.
  # 0.99 means rewards 100 steps in the future are still worth e^(−0.01×100) ≈ 37 %
  gamma: 0.99

  # MLP hidden layer widths — actor and critic are sized separately.
  #
  # Actor is smaller: it just needs to learn which action is relatively
  # better, not the exact value of each state.
  actor_hidden_sizes: [64, 64]

  # Critic is wider: it approximates V^π(s), a harder regression target
  # that shifts as the policy improves.  Extra capacity helps it stay
  # accurate, keeping the advantage signal A_t = G_t − V(s_t) clean.
  # Actor:  state_dim → 64  → 64 → num_actions
  # Critic: state_dim → 128 → 64 → 1
  critic_hidden_sizes: [128, 64]

  # Entropy bonus weight c_H.
  # Adds c_H · H(π) to the actor objective, discouraging the policy from
  # collapsing onto a single action before it has properly explored.
  # 0.01 is a good starting point; increase to 0.05 if the policy stalls early.
  entropy_coef: 0.01

  # Critic loss weight c_v (used for combined-loss logging only).
  # Actor and critic are updated with SEPARATE gradient passes (alpha_actor /
  # alpha_critic), so this value does NOT affect the actual weight updates.
  critic_coef: 0.5

# Model persistence settings
model:
  path: models/a2c_coach.json
  load_on_start: true
  save_on_exit: true
  autosave_every_n_steps: 1000
  num_workers: 1

# Logging / monitoring settings
logs:
  log_enabled: true
  log_every_n_steps: 100
  log_dir: logs
  reward_window: 20     # episodes to average reward over
  plot_enabled: true
  plot_refresh_interval: 5.0   # seconds
