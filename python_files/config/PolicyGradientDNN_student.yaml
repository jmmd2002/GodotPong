# REINFORCE Policy Gradient Agent — DNN version (JAX) — Student

# State variables (continuous, normalised to [-1, 1] by Godot)
# Student sees both paddles and the ball
state:
  - paddleA_y
  - paddleB_y
  - ball_x
  - ball_y
  - ball_vx
  - ball_vy

# Available actions
actions:
  - UP
  - DOWN
  - STAY

# Learning hyperparameters
hyperparameters:
  alpha: 0.001        # Learning rate — smaller than linear agent; DNN gradients are denser
  gamma: 0.99         # Discount factor: 0 = myopic, 1 = full return
  hidden_sizes: [128, 64]   # MLP hidden layer widths: state_dim→128→64→num_actions

# Model persistence settings
model:
  path: models/policy_dnn_student.json
  load_on_start: true
  save_on_exit: true
  autosave_every_n_steps: 100
  num_workers: 2

# Logging / monitoring settings
logs:
  log_enabled: true
  log_every_n_steps: 100
  log_dir: logs
  reward_window: 20   # episodes
  plot_enabled: false
  plot_refresh_interval: 5.0   # seconds
